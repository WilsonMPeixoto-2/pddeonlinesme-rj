name: Generate lockfile artifact (temporary)

on:
  push:
    branches:
      - deps-safe-update-2026

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Generate package lock
        run: npm install --package-lock-only --ignore-scripts

      - name: Capture audit report
        run: npm audit --json > npm-audit.json || true

      - name: Upload lockfile artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-lockfile
          path: |
            package-lock.json
            npm-audit.json
          if-no-files-found: error
