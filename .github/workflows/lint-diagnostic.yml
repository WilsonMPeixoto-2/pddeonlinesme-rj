name: Lint Diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  report:
    name: Generate ESLint report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Generate structured lint report
        run: |
          set +e
          npx eslint . --format json --output-file lint-report.json
          status=$?
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const report = JSON.parse(fs.readFileSync('lint-report.json', 'utf8'));
          const rows = report
            .filter((entry) => entry.errorCount || entry.warningCount)
            .map((entry) => ({
              filePath: entry.filePath,
              errorCount: entry.errorCount,
              warningCount: entry.warningCount,
              messages: entry.messages.map(({ ruleId, severity, line, column, message }) => ({
                ruleId,
                severity,
                line,
                column,
                message,
              })),
            }));
          fs.writeFileSync('lint-summary.json', JSON.stringify(rows, null, 2));
          console.log(`ESLint: ${rows.reduce((sum, row) => sum + row.errorCount, 0)} erro(s), ${rows.reduce((sum, row) => sum + row.warningCount, 0)} aviso(s), ${rows.length} arquivo(s).`);
          NODE
          echo "$status" > lint-exit-code.txt
          exit 0

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: |
            lint-report.json
            lint-summary.json
            lint-exit-code.txt
          retention-days: 1
