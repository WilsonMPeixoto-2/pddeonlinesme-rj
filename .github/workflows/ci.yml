name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Security Fix, Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply safe npm audit fixes
        shell: bash
        run: |
          set +e
          npm audit fix
          audit_status=$?
          set -e
          if [ "$audit_status" -ne 0 ] && git diff --quiet -- package.json package-lock.json; then
            echo "npm audit fix failed without producing safe dependency changes."
            exit "$audit_status"
          fi
          echo "Safe dependency changes were produced; residual findings will be documented separately."

      - name: Commit safe security fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No additional safe audit fixes were needed."
          else
            git commit -m "chore(deps): aplicar correções seguras do npm audit"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Capture post-fix audit reports
        shell: bash
        run: |
          npm audit --json > npm-audit.json || audit_full_status=$?
          npm audit --omit=dev --json > npm-audit-production.json || audit_prod_status=$?
          echo "Full audit status: ${audit_full_status:-0}"
          echo "Production audit status: ${audit_prod_status:-0}"

      - name: Upload post-fix audit reports
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-post-fix
          path: |
            npm-audit.json
            npm-audit-production.json
          if-no-files-found: error

      - name: Reinstall from committed lockfile
        run: |
          rm -rf node_modules
          npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
