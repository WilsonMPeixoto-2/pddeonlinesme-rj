name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose:
    name: Diagnose dependency resolution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Capture dependency resolution
        shell: bash
        run: |
          set +e
          npm install --package-lock-only --ignore-scripts > dependency-resolution.log 2>&1
          status=$?
          set -e
          echo "$status" > dependency-resolution.status
          cat dependency-resolution.log

      - name: Upload dependency resolution report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-resolution-report
          path: |
            dependency-resolution.log
            dependency-resolution.status
          if-no-files-found: error

      - name: Propagate resolution result
        shell: bash
        run: |
          status=$(cat dependency-resolution.status)
          exit "$status"
